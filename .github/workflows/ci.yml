name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read


jobs:
  pre-commit:
    name: Run pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Runs every hook in .pre-commit-config.yaml against all files:
      # nbstripout (verify), ruff, nbformat-validate, JSON/merge hygiene.
      # A hook that modifies a file (e.g. nbstripout) fails the run and shows
      # the diff.
      #
      # NOTE: the gitleaks pre-commit hook only scans STAGED changes, so under
      # --all-files (nothing staged) it is effectively a no-op here. Its job is
      # to block secrets locally before they are committed.
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --show-diff-on-failure
